# Manual-trigger build & test. Promote to push/PR triggers at public launch.
name: ci

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (std-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --locked --verbose
      - name: Test
        run: cargo test --locked --verbose
