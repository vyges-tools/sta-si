# Matrix multi-platform release build.
# Manual trigger for now (workflow_dispatch with a tag input). To make it
# tag-driven later, add:  push: { tags: ['v*'] }  and read the tag from the ref.
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,        target: aarch64-apple-darwin }
          - { os: macos-13,        target: x86_64-apple-darwin }
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="vyges-${GITHUB_REPOSITORY##*/}"
          stage="${bin}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${bin}" "$stage/"
          cp README.md LICENSE NOTICE "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
